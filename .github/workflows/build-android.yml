name: Build Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check
      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
      - name: Build release APK (Expo default-signs with the debug keystore — fine for direct-install soft launch)
        run: cd android && ./gradlew assembleRelease --no-daemon
      - run: cp android/app/build/outputs/apk/release/app-release.apk LawCosmosAI.apk
      - uses: actions/upload-artifact@v4
        with:
          name: LawCosmosAI-apk
          path: LawCosmosAI.apk
      - name: Attach APK to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LawCosmosAI.apk
          generate_release_notes: true
